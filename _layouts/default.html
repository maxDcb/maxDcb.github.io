<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div>
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <p class="site-description">{{ site.description }}</p>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">Articles</a>
          <a href="{{ '/projects/' | relative_url }}">Projects</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="https://github.com/{{ site.github_username }}">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="container content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Research notes by {{ site.author }}. Source available on <a href="https://github.com/{{ site.github_username }}/{{ site.github_username }}.github.io">GitHub</a>.</p>
      </div>
    </footer>
  </body>
</html>
